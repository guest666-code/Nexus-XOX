<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus XOX - Online Tic-Tac-Toe</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
              orbit: ['Rajdhani', 'sans-serif'],
            },
            colors: {
              nexusDark: '#0B0F19',
              nexusPurple: '#6366F1',
              nexusNeon: '#00F5FF',
            }
          }
        }
      }
    </script>

    <style>
      /* Arka plana tatlı bir siber oyun atmosferi vermek için hafif bir gradient */

        background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
        color: #f8fafc;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
    </style>
